# Конфигурация Redis для кэша RAG (агрегаты статистики/аналитики).
# Кэш не критичен к потере (сбрасывается при каждом новом запросе), но включена
# лёгкая персистентность, чтобы кэш переживал перезапуск контейнера.

# Лимит памяти и вытеснение наименее используемых ключей при достижении лимита.
maxmemory 256mb
maxmemory-policy allkeys-lru

# Персистентность: AOF (журнал) + периодические снимки RDB.
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000

# Пароль (по умолчанию выключен — Redis доступен только внутри сети compose).
# Чтобы включить: раскомментируйте строку ниже, задайте пароль и тот же пароль
# пропишите в docker-compose.yml (REDIS_PASSWORD=...) и в .env.docker.
# requirepass ЗАМЕНИТЕ_НА_СВОЙ_ПАРОЛЬ
