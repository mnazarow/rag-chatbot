# Override для работы приложения на GPU NVIDIA (эмбеддинги/реранк/Whisper).
#
# Использование (вместе с основным compose):
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build
#
# Что делает:
#   - собирает образ с CUDA-сборкой PyTorch (build-arg TORCH_INDEX_URL=cu124);
#   - выставляет DEVICE=cuda (перекрывает DEVICE=cpu из .env.docker);
#   - пробрасывает все GPU NVIDIA в контейнер app.
#
# Требования на ХОСТЕ:
#   - драйвер NVIDIA;
#   - Linux: NVIDIA Container Toolkit (пакет nvidia-container-toolkit), затем
#     `sudo nvidia-ctk runtime configure --runtime=docker && sudo systemctl restart docker`;
#   - Windows: Docker Desktop с включённой поддержкой GPU (WSL2 + драйвер NVIDIA).
# Проверка: `docker run --rm --gpus all nvidia/cuda:12.4.0-base-ubuntu22.04 nvidia-smi`.
#
# Генерация (LLM) по-прежнему идёт через Ollama на хосте — Ollama сама использует GPU
# хоста; здесь GPU ускоряет именно индексацию/поиск (bge-m3 + реранкер).

services:
  app:
    build:
      args:
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cu124
    environment:
      - DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
